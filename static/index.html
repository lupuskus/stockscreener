<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Stock Screener</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4/dist/chart.umd.min.js"></script>
  <script src="https://unpkg.com/lightweight-charts@4.2.0/dist/lightweight-charts.standalone.production.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f3f5f8;
      --surface: #ffffff;
      --border: #e1e4ea;
      --muted: #6d7480;
      --text: #20242c;
      --up: #16a34a;
      --down: #dc2626;
      --accent: #2563eb;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      font-size: 13px;
      color: var(--text);
      background: var(--bg);
      min-height: 100vh;
      overflow: hidden;
    }

    #app {
      display: grid;
      grid-template-rows: auto auto auto auto 1fr auto;
      height: 100vh;
    }

    #hdr {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    #hdr-title {
      font-size: 15px;
      font-weight: 700;
    }

    #backend-badge {
      margin-left: auto;
      font-size: 11px;
      color: var(--muted);
    }

    #market-strip {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      gap: 18px;
      overflow-x: auto;
      white-space: nowrap;
    }

    .mkt-item {
      display: inline-flex;
      gap: 6px;
      align-items: baseline;
      cursor: pointer;
      padding: 1px 0;
    }

    .mkt-item:hover .mkt-label {
      text-decoration: underline;
    }

    .mkt-label { color: var(--muted); font-weight: 600; }
    .mkt-price { font-weight: 700; }
    .mkt-chg { font-weight: 600; }

    .up { color: var(--up); }
    .dn { color: var(--down); }
    .flat { color: var(--muted); }

    #controls {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 8px 14px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    #controls label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
    }

    #controls select {
      border: 1px solid #cfd5df;
      border-radius: 4px;
      font-size: 12px;
      padding: 4px 8px;
      background: #fff;
    }

    #status-msg {
      margin-left: auto;
      color: var(--muted);
      font-size: 11px;
    }

    #error-msg {
      color: var(--down);
      font-size: 11px;
    }

    #screen-progress {
      height: 0;
      overflow: hidden;
      background: var(--surface);
      border-bottom: 1px solid transparent;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 14px;
      transition: height 0.15s ease;
    }

    #screen-progress.visible {
      height: 24px;
      border-bottom-color: var(--border);
    }

    #screen-progress-track {
      flex: 1;
      height: 5px;
      background: #e5e7eb;
      border-radius: 3px;
      overflow: hidden;
    }

    #screen-progress-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      width: 0%;
      transition: width 0.15s ease;
    }

    #screen-progress-text {
      font-size: 11px;
      color: var(--muted);
      min-width: 64px;
      text-align: right;
    }

    #workspace {
      display: grid;
      grid-template-columns: minmax(420px, 52%) minmax(420px, 48%);
      gap: 10px;
      padding: 10px;
      min-height: 0;
      height: 100%;
    }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
      min-height: 0;
    }

    #table-panel {
      display: grid;
      grid-template-rows: auto 1fr;
    }

    .panel-head {
      padding: 8px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
      font-weight: 700;
      color: #3e4653;
      background: #fbfcfe;
    }

    #table-wrap {
      overflow: auto;
      min-height: 0;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 12px;
    }

    thead th {
      position: sticky;
      top: 0;
      z-index: 2;
      background: #f8fafc;
      border-bottom: 1px solid var(--border);
      color: #4b5563;
      font-weight: 700;
      padding: 7px 9px;
      text-align: left;
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }

    thead th.numeric, td.numeric { text-align: right; }
    thead th.sorted-asc::after { content: "  ^"; font-size: 10px; }
    thead th.sorted-desc::after { content: "  v"; font-size: 10px; }

    tbody tr {
      border-bottom: 1px solid #edf1f5;
      cursor: pointer;
    }

    tbody tr:hover { background: #f4f9ff; }
    tbody tr.selected { background: #e7f0ff; }

    td {
      padding: 6px 9px;
      white-space: nowrap;
      color: #2f3641;
    }

    td.ticker {
      color: var(--accent);
      font-weight: 700;
    }

    td.numeric {
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
      font-size: 11px;
    }

    th.watch-col,
    td.watch-col {
      width: 56px;
      min-width: 56px;
      max-width: 56px;
      text-align: center;
      padding-left: 4px;
      padding-right: 4px;
    }

    .watch-toggle {
      width: 14px;
      height: 14px;
      cursor: pointer;
      accent-color: #2563eb;
    }

    .watch-toggle:disabled {
      opacity: 0.55;
      cursor: wait;
    }

    #chart-panel {
      display: grid;
      grid-template-rows: auto auto 1fr;
      min-height: 0;
    }

    #chart-title-row {
      padding: 10px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    #chart-title {
      font-size: 16px;
      font-weight: 700;
    }

    #chart-subtitle {
      margin-top: 2px;
      font-size: 12px;
      color: var(--muted);
    }

    #period-btns {
      display: flex;
      gap: 6px;
    }

    #chart-mode-btns {
      display: flex;
      gap: 6px;
      margin-right: 8px;
    }

    .period-btn {
      border: 1px solid #cfd5df;
      border-radius: 4px;
      background: #fff;
      color: #374151;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      cursor: pointer;
    }

    .period-btn.active {
      border-color: #1d4ed8;
      background: #2563eb;
      color: #fff;
    }

    #chart-wrap {
      position: relative;
      min-height: 0;
      padding: 10px;
    }

    #the-chart {
      position: absolute !important;
      inset: 10px;
    }

    #candle-chart {
      position: absolute;
      inset: 10px;
      display: none;
    }

    #chart-loader {
      position: absolute;
      inset: 0;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      color: var(--muted);
      background: rgba(255, 255, 255, 0.7);
    }

    .view-btns {
      display: flex;
      gap: 4px;
    }

    .view-btn {
      border: 1px solid #cfd5df;
      border-radius: 4px;
      background: #fff;
      color: #374151;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 9px;
      cursor: pointer;
    }

    .view-btn.active {
      border-color: #1d4ed8;
      background: #2563eb;
      color: #fff;
    }

    #workspace.view-table {
      grid-template-columns: 1fr;
    }

    #workspace.view-table #chart-panel {
      display: none;
    }

    #workspace.view-chart {
      grid-template-columns: 1fr;
    }

    #workspace.view-chart #table-panel {
      display: none;
    }

    #build-info {
      background: var(--surface);
      border-top: 1px solid var(--border);
      color: var(--muted);
      font-size: 11px;
      padding: 6px 12px;
      text-align: right;
    }

    @media (max-width: 1100px) {
      body { overflow: auto; }
      #app { height: auto; min-height: 100vh; }
      #workspace {
        grid-template-columns: 1fr;
        grid-template-rows: 52vh 52vh;
        height: auto;
      }
    }
  </style>
</head>
<body>
<div id="app">
  <header id="hdr">
    <div id="hdr-title">Stock Screener</div>
    <div id="backend-badge">Checking...</div>
  </header>

  <div id="market-strip">
    <div class="mkt-item"><span class="mkt-label">Loading market data...</span></div>
  </div>

  <div id="controls">
    <label for="list-select">List</label>
    <select id="list-select" disabled></select>
    <span id="status-msg"></span>
    <span id="error-msg"></span>
    <div class="view-btns" style="margin-left:auto">
      <button class="view-btn" data-view="table" title="Table only">Table</button>
      <button class="view-btn active" data-view="split" title="Split view">Split</button>
      <button class="view-btn" data-view="chart" title="Chart only">Chart</button>
    </div>
  </div>

  <div id="screen-progress">
    <div id="screen-progress-track"><div id="screen-progress-fill"></div></div>
    <span id="screen-progress-text"></span>
  </div>

  <main id="workspace">
    <section id="table-panel" class="panel">
      <div class="panel-head">Symbols</div>
      <div id="table-wrap">
        <table>
          <thead>
            <tr>
              <th data-col="ticker">Ticker</th>
              <th class="watch-col" title="Watchlist">&#128065;</th>
              <th class="numeric" data-col="close">Close</th>
              <th class="numeric" data-col="chg">Chg</th>
              <th class="numeric" data-col="chgpct">Chg %</th>
              <th class="numeric" data-col="open">Open</th>
              <th class="numeric" data-col="high">High</th>
              <th class="numeric" data-col="low">Low</th>
              <th class="numeric" data-col="volume">Volume</th>
            </tr>
          </thead>
          <tbody id="tbody">
            <tr>
              <td colspan="9" style="padding: 24px; text-align: center; color: #7c8592;">
                Select a list to load symbols.
              </td>
            </tr>
          </tbody>
        </table>
      </div>
    </section>

    <section id="chart-panel" class="panel">
      <div class="panel-head">Chart</div>
      <div id="chart-title-row">
        <div>
          <div id="chart-title">FTSE 100</div>
          <div id="chart-subtitle">Loading...</div>
        </div>
        <div id="chart-mode-btns">
          <button class="period-btn" data-chart-mode="line">Line</button>
          <button class="period-btn active" data-chart-mode="candles">Candles</button>
        </div>
        <div id="period-btns">
          <button class="period-btn" data-p="5d">5D</button>
          <button class="period-btn active" data-p="1mo">1M</button>
          <button class="period-btn" data-p="3mo">3M</button>
          <button class="period-btn" data-p="6mo">6M</button>
          <button class="period-btn" data-p="1y">1Y</button>
        </div>
      </div>
      <div id="chart-wrap">
        <canvas id="the-chart"></canvas>
        <div id="candle-chart"></div>
        <div id="chart-loader">Loading chart...</div>
      </div>
    </section>
  </main>

  <footer id="build-info">Build: loading...</footer>
</div>

<script>
  const API = "";

  const f2 = new Intl.NumberFormat("en-GB", { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  const fVol = new Intl.NumberFormat("en-GB");
  const p2 = (v) => f2.format(v);
  const pVol = (v) => fVol.format(v);
  const pVolAxis = (v) => {
    if (v >= 1e9) return (v / 1e9).toFixed(1).replace(/\.0$/, "") + "B";
    if (v >= 1e6) return (v / 1e6).toFixed(1).replace(/\.0$/, "") + "M";
    if (v >= 1e3) return (v / 1e3).toFixed(0) + "K";
    return String(v);
  };
  const pPct = (v) => (v >= 0 ? "+" : "") + v.toFixed(2) + "%";
  const cls = (v) => (v > 0 ? "up" : v < 0 ? "dn" : "flat");

  const $ = (id) => document.getElementById(id);
  const elBadge = $("backend-badge");
  const elStrip = $("market-strip");
  const elSelect = $("list-select");
  const elStatus = $("status-msg");
  const elError = $("error-msg");
  const elProgress = $("screen-progress");
  const elProgressFill = $("screen-progress-fill");
  const elProgressText = $("screen-progress-text");
  const elTbody = $("tbody");
  const elTitle = $("chart-title");
  const elSub = $("chart-subtitle");
  const elLoader = $("chart-loader");
  const elCandle = $("candle-chart");
  const elBuildInfo = $("build-info");

  const DEFAULT_MARKET_TICKER = "^FTSE";

  let chart = null;
  let candleChart = null;
  let candleSeries = null;
  let candleVolumeSeries = null;
  let currentCandleData = [];
  let currChartMode = "candles";
  let currTicker = DEFAULT_MARKET_TICKER;
  let currPeriod = "1mo";
  let sortCol = "ticker";
  let sortAsc = true;
  let stockData = [];
  let selectedTicker = "";
  let watchlistSet = new Set();
  const watchlistBusy = new Set();

  const IDX_TICKER = { ftse100: "^FTSE", ftse250: "^FTMC" };
  const ctx = $("the-chart").getContext("2d");

  function setChartMode(mode) {
    currChartMode = mode;
    const lineCanvas = $("the-chart");
    if (mode === "candles") {
      lineCanvas.style.display = "none";
      elCandle.style.display = "block";
    } else {
      elCandle.style.display = "none";
      lineCanvas.style.display = "block";
    }
  }

  function ensureCandleChart() {
    if (candleChart) {
      return;
    }

    if (!window.LightweightCharts || typeof LightweightCharts.createChart !== "function") {
      throw new Error("Candlestick chart library unavailable");
    }

    candleChart = LightweightCharts.createChart(elCandle, {
      layout: {
        background: { color: "#ffffff" },
        textColor: "#4b5563",
      },
      grid: {
        vertLines: { color: "#edf2f7" },
        horzLines: { color: "#edf2f7" },
      },
      rightPriceScale: {
        borderColor: "#e1e4ea",
      },
      leftPriceScale: {
        visible: true,
        borderColor: "#e1e4ea",
        scaleMargins: { top: 0.8, bottom: 0 },
      },
      timeScale: {
        borderColor: "#e1e4ea",
      },
      width: elCandle.clientWidth,
      height: elCandle.clientHeight,
    });

    if (typeof candleChart.addCandlestickSeries !== "function") {
      throw new Error("Candlestick chart API unavailable");
    }

    candleSeries = candleChart.addCandlestickSeries({
      upColor: "#16a34a",
      downColor: "#dc2626",
      wickUpColor: "#16a34a",
      wickDownColor: "#dc2626",
      borderVisible: false,
    });

    candleVolumeSeries = candleChart.addHistogramSeries({
      priceFormat: { type: "volume" },
      priceScaleId: "left",
      lastValueVisible: true,
    });
  }

  function updateCandleSpacing(candles) {
    if (!candleChart || !candles || candles.length === 0) {
      return;
    }

    const containerWidth = Math.max(elCandle.clientWidth, 320);
    const candleCount = Math.max(candles.length, 1);
    const targetSpacing = containerWidth / candleCount;
    const barSpacing = Math.min(Math.max(targetSpacing * 0.9, 1.5), 32);

    candleChart.timeScale().applyOptions({
      barSpacing,
      minBarSpacing: Math.min(Math.max(barSpacing * 0.6, 0.5), barSpacing),
      rightOffset: 0,
    });
    candleChart.timeScale().fitContent();
  }

  function buildChart(labels, prices, volumes, volumeColors, label) {
    if (chart) {
      chart.destroy();
      chart = null;
    }

    const rising = prices.length >= 2 && prices.at(-1) >= prices[0];
    const col = rising ? "#16a34a" : "#dc2626";

    chart = new Chart(ctx, {
      type: "bar",
      data: {
        labels,
        datasets: [
          {
            type: "line",
            label,
            data: prices,
            borderColor: col,
            backgroundColor: col + "18",
            borderWidth: 1.6,
            pointRadius: 0,
            tension: 0.2,
            fill: true,
            yAxisID: "price",
            order: 1,
          },
          {
            type: "bar",
            label: "Volume",
            data: volumes,
            backgroundColor: volumeColors,
            borderWidth: 0,
            yAxisID: "volume",
            order: 2,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        animation: false,
        interaction: { mode: "index", intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            callbacks: {
              label: (c) => {
                if (c.dataset.label === "Volume") {
                  return "Volume: " + pVol(c.parsed.y);
                }
                return p2(c.parsed.y);
              },
            },
          },
        },
        scales: {
          x: {
            ticks: { maxTicksLimit: 10, maxRotation: 0, color: "#7b8490", font: { size: 11 } },
            grid: { color: "#edf2f7" },
          },
          price: {
            position: "right",
            ticks: { color: "#7b8490", font: { size: 11 }, callback: (v) => p2(v) },
            grid: { color: "#edf2f7" },
          },
          volume: {
            position: "left",
            display: true,
            beginAtZero: true,
            grid: { display: false },
            ticks: {
              color: "#7b8490",
              font: { size: 10 },
              maxTicksLimit: 4,
              callback: (v) => pVolAxis(v),
            },
          },
        },
      },
    });
  }

  async function loadChart(ticker, period) {
    elLoader.style.display = "flex";
    elTitle.textContent = ticker;
    elSub.textContent = "Loading...";

    try {
      const endpoint = currChartMode === "candles" ? "/history-ohlc/" : "/history/";
      const res = await fetch(API + endpoint + encodeURIComponent(ticker) + "?period=" + period);
      if (!res.ok) throw new Error("No chart data");

      const payload = await res.json();
      const series = payload.series || [];
      if (series.length === 0) throw new Error("Empty chart series");

      let prices;
      if (currChartMode === "candles") {
        ensureCandleChart();
        const candles = series.map((d) => ({
          time: d.date,
          open: d.open,
          high: d.high,
          low: d.low,
          close: d.close,
        }));
        const volumeBars = series.map((d) => ({
          time: d.date,
          value: d.volume ?? 0,
          color: d.close >= d.open ? "rgba(22, 163, 74, 0.45)" : "rgba(220, 38, 38, 0.45)",
        }));
        currentCandleData = candles;
        candleSeries.setData(candles);
        candleVolumeSeries.setData(volumeBars);
        updateCandleSpacing(candles);
        prices = candles.map((d) => d.close);
      } else {
        currentCandleData = [];
        const labels = series.map((d) => d.date);
        prices = series.map((d) => d.close);
        const volumes = series.map((d) => d.volume ?? 0);
        const volumeColors = series.map((d, index) => {
          const previousClose = index > 0 ? series[index - 1].close : d.close;
          return d.close >= previousClose ? "rgba(22, 163, 74, 0.35)" : "rgba(220, 38, 38, 0.35)";
        });
        buildChart(labels, prices, volumes, volumeColors, ticker);
      }

      const chg = prices.at(-1) - prices[0];
      const pct = (chg / prices[0]) * 100;
      const c = cls(chg);
      elSub.innerHTML = '<span class="' + c + '">' + p2(prices.at(-1)) + " " + pPct(pct) + '</span><span style="color:#7b8490"> (' + period + ")</span>";
    } catch (err) {
      elSub.textContent = "Chart data unavailable";
    } finally {
      elLoader.style.display = "none";
    }
  }

  function setSelectedRow() {
    document.querySelectorAll("#tbody tr[data-ticker]").forEach((row) => {
      row.classList.toggle("selected", row.dataset.ticker === selectedTicker);
    });
  }

  function readApiError(payload, fallback) {
    return payload?.detail?.error?.message || payload?.detail?.message || payload?.detail || fallback;
  }

  async function loadWatchlist() {
    const res = await fetch(API + "/watchlist");
    if (!res.ok) throw new Error("Watchlist fetch failed");
    const payload = await res.json();
    watchlistSet = new Set(payload.watchlist || []);
  }

  async function loadBuildInfo() {
    try {
      const res = await fetch(API + "/build-info");
      if (!res.ok) throw new Error("Build metadata unavailable");
      const payload = await res.json();
      const branch = payload.branch || "unknown";
      const shortCommit = payload.short_commit || "unknown";
      elBuildInfo.textContent = "Build: " + branch + " @ " + shortCommit;
    } catch {
      elBuildInfo.textContent = "Build: local";
    }
  }

  async function updateWatchlist(ticker, shouldAdd) {
    watchlistBusy.add(ticker);
    renderTable();

    try {
      let res;
      if (shouldAdd) {
        res = await fetch(API + "/watchlist", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ ticker }),
        });
      } else {
        res = await fetch(API + "/watchlist/" + encodeURIComponent(ticker), {
          method: "DELETE",
        });
      }

      const payload = await res.json().catch(() => ({}));
      if (!res.ok) {
        throw new Error(readApiError(payload, "Watchlist update failed"));
      }

      watchlistSet = new Set(payload.watchlist || []);
      elError.textContent = "";
    } catch (err) {
      elError.textContent = err.message || "Watchlist update failed";
    } finally {
      watchlistBusy.delete(ticker);
      renderTable();
    }
  }

  function showMarketChart() {
    selectedTicker = "";
    setSelectedRow();
    currTicker = DEFAULT_MARKET_TICKER;
    loadChart(currTicker, currPeriod);
  }

  async function loadIndexes() {
    try {
      const res = await fetch(API + "/indexes");
      if (!res.ok) throw new Error("Index fetch failed");
      const data = await res.json();

      const items = Object.entries(data).map(([name, d]) => {
        const chg = d.close - d.open;
        const pct = (chg / d.open) * 100;
        const ticker = IDX_TICKER[name] || name;

        return '<div class="mkt-item" data-ticker="' + ticker + '">' +
          '<span class="mkt-label">' + name.toUpperCase() + '</span>' +
          '<span class="mkt-price">' + p2(d.close) + '</span>' +
          '<span class="mkt-chg ' + cls(chg) + '">' + pPct(pct) + '</span>' +
          '</div>';
      });

      elStrip.innerHTML = items.join("");

    } catch (err) {
      elStrip.innerHTML = '<div class="mkt-item"><span class="mkt-label" style="color:#dc2626">Index data unavailable</span></div>';
    }
  }

  async function loadLists() {
    try {
      const res = await fetch(API + "/stock-lists");
      if (!res.ok) throw new Error("Stock list fetch failed");

      const payload = await res.json();
      const lists = payload.stock_lists || [];

      lists.forEach((name) => {
        const o = document.createElement("option");
        o.value = name;
        o.textContent = name.replace(".stocks", "").replace(/[-_]/g, " ").toUpperCase();
        elSelect.appendChild(o);
      });

      if (lists.includes("watchlist.stocks")) {
        elSelect.value = "watchlist.stocks";
      } else if (lists.length > 0) {
        elSelect.value = lists[0];
      }

      elSelect.disabled = lists.length === 0;
    } catch (err) {
      elError.textContent = "Could not load stock lists.";
    }
  }

  function renderTable() {
    const rows = [...stockData].sort((a, b) => {
      const va = a[sortCol] ?? 0;
      const vb = b[sortCol] ?? 0;
      if (typeof va === "string") return sortAsc ? va.localeCompare(vb) : vb.localeCompare(va);
      return sortAsc ? va - vb : vb - va;
    });

    elTbody.innerHTML = rows.map((s) => {
      const changeClass = cls(s.chg);
      const inWatchlist = watchlistSet.has(s.ticker);
      const busy = watchlistBusy.has(s.ticker);
      return '<tr data-ticker="' + s.ticker + '">' +
        '<td class="ticker">' + s.ticker + '</td>' +
        '<td class="watch-col"><input class="watch-toggle" type="checkbox" data-watch-ticker="' + s.ticker + '"' + (inWatchlist ? ' checked' : '') + (busy ? ' disabled' : '') + ' aria-label="Toggle watchlist for ' + s.ticker + '"></td>' +
        '<td class="numeric">' + p2(s.close) + '</td>' +
        '<td class="numeric ' + changeClass + '">' + p2(s.chg) + '</td>' +
        '<td class="numeric ' + changeClass + '">' + pPct(s.chgpct) + '</td>' +
        '<td class="numeric">' + p2(s.open) + '</td>' +
        '<td class="numeric">' + p2(s.high) + '</td>' +
        '<td class="numeric">' + p2(s.low) + '</td>' +
        '<td class="numeric">' + pVol(s.volume) + '</td>' +
        '</tr>';
    }).join("");

    elTbody.querySelectorAll("tr[data-ticker]").forEach((row) => {
      row.addEventListener("click", () => {
        selectedTicker = row.dataset.ticker;
        setSelectedRow();
        currTicker = selectedTicker;
        loadChart(currTicker, currPeriod);
      });
    });

    elTbody.querySelectorAll("input[data-watch-ticker]").forEach((toggle) => {
      toggle.addEventListener("click", (event) => {
        event.stopPropagation();
      });

      toggle.addEventListener("change", (event) => {
        const ticker = toggle.dataset.watchTicker;
        const shouldAdd = event.target.checked;
        updateWatchlist(ticker, shouldAdd);
      });
    });

    document.querySelectorAll("thead th[data-col]").forEach((th) => {
      th.classList.remove("sorted-asc", "sorted-desc");
      if (th.dataset.col === sortCol) {
        th.classList.add(sortAsc ? "sorted-asc" : "sorted-desc");
      }
    });

    setSelectedRow();
  }

  function showProgress(done, total) {
    elProgress.classList.add("visible");
    elProgressFill.style.width = (total > 0 ? (done / total) * 100 : 0) + "%";
    elProgressText.textContent = done + " / " + total;
  }

  function hideProgress() {
    elProgress.classList.remove("visible");
    elProgressFill.style.width = "0%";
    elProgressText.textContent = "";
  }

  async function runScreen() {
    if (!elSelect.value) {
      return;
    }

    elSelect.disabled = true;
    elStatus.textContent = "";
    elError.textContent = "";
    showProgress(0, 1);

    return new Promise((resolve) => {
      const url =
        API +
        "/screen/stream?stock_list=" +
        encodeURIComponent(elSelect.value) +
        "&period=1d";
      const source = new EventSource(url);

      source.onmessage = (e) => {
        let msg;
        try {
          msg = JSON.parse(e.data);
        } catch {
          return;
        }

        if (msg.type === "progress") {
          showProgress(msg.done, msg.total);
        } else if (msg.type === "complete") {
          source.close();
          hideProgress();
          stockData = (msg.stocks || []).map((s) => ({
            ...s,
            chg: s.close - s.open,
            chgpct: ((s.close - s.open) / s.open) * 100,
          }));
          elStatus.textContent = msg.retrieved + " / " + msg.requested + " stocks";
          renderTable();
          elSelect.disabled = false;
          resolve();
        } else if (msg.type === "error") {
          source.close();
          hideProgress();
          elError.textContent = msg.message || "Screen failed";
          elSelect.disabled = false;
          resolve();
        }
      };

      source.onerror = () => {
        source.close();
        hideProgress();
        elError.textContent = "Screen failed";
        elSelect.disabled = false;
        resolve();
      };
    });
  }

  elSelect.addEventListener("change", runScreen);

  document.querySelectorAll("thead th[data-col]").forEach((th) => {
    th.addEventListener("click", () => {
      const col = th.dataset.col;
      if (sortCol === col) {
        sortAsc = !sortAsc;
      } else {
        sortCol = col;
        sortAsc = true;
      }

      if (stockData.length > 0) {
        renderTable();
      }
    });
  });

  $("period-btns").addEventListener("click", (event) => {
    const btn = event.target.closest(".period-btn");
    if (!btn) return;

    document.querySelectorAll(".period-btn").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");

    currPeriod = btn.dataset.p;
    loadChart(currTicker, currPeriod);
  });

  $("chart-mode-btns").addEventListener("click", (event) => {
    const btn = event.target.closest("button[data-chart-mode]");
    if (!btn) return;

    document.querySelectorAll("button[data-chart-mode]").forEach((b) => b.classList.remove("active"));
    btn.classList.add("active");

    setChartMode(btn.dataset.chartMode);
    loadChart(currTicker, currPeriod);
  });

  document.addEventListener("click", (event) => {
    if (event.target.closest("#tbody tr[data-ticker]")) {
      return;
    }

    if (selectedTicker || currTicker !== DEFAULT_MARKET_TICKER) {
      showMarketChart();
    }
  });

  async function init() {
    try {
      const res = await fetch(API + "/health");
      if (res.ok) {
        elBadge.textContent = "Online";
        elBadge.style.color = "#16a34a";
      } else {
        elBadge.textContent = "Offline";
        elBadge.style.color = "#dc2626";
      }
    } catch (err) {
      elBadge.textContent = "Offline";
      elBadge.style.color = "#dc2626";
    }

    await Promise.all([loadIndexes(), loadLists(), loadWatchlist(), loadBuildInfo()]);
    if (elSelect.value) {
      await runScreen();
    }
    setChartMode(currChartMode);
    loadChart(currTicker, currPeriod);
  }

  let currView = "split";

  function setView(view) {
    currView = view;
    const ws = document.getElementById("workspace");
    ws.classList.remove("view-split", "view-table", "view-chart");
    ws.classList.add("view-" + view);
    document.querySelectorAll(".view-btn").forEach((b) => {
      b.classList.toggle("active", b.dataset.view === view);
    });
    // Give the DOM time to relayout before resizing the candle chart
    requestAnimationFrame(() => {
      if (candleChart) {
        candleChart.resize(elCandle.clientWidth, elCandle.clientHeight);
        updateCandleSpacing(currentCandleData);
      }
    });
  }

  document.querySelectorAll(".view-btn").forEach((btn) => {
    btn.addEventListener("click", () => setView(btn.dataset.view));
  });

  window.addEventListener("resize", () => {
    if (candleChart) {
      candleChart.resize(elCandle.clientWidth, elCandle.clientHeight);
      updateCandleSpacing(currentCandleData);
    }
  });

  init();
</script>
</body>
</html>
